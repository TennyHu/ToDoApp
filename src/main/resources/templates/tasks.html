<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 28px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: #667eea;
            color: white;
        }

        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-delete:hover {
            background: #ee5a6f;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 16px;
        }

        .task-count {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✓ My Tasks</h1>

    <!-- Add Task Form -->
    <form action="/todotasks" method="post" class="input-group">
        <input type="text" name="title" placeholder="What needs to be done?" required>
        <button type="submit" class="btn btn-add">Add</button>
    </form>

    <!-- Task List -->
    <ul class="task-list" th:if="${tasks != null and !tasks.isEmpty()}">
        <li th:each="task : ${tasks}"
            th:class="${task.completed} ? 'task-item completed' : 'task-item'"
            th:attr="data-id=${task.id}">

            <!-- Toggle Checkbox -->
            <input type="checkbox"
                   class="checkbox"
                   th:checked="${task.completed}"
                   th:onclick="'toggleTask(' + ${task.id} + ')'">

            <!-- Task Title -->
            <span class="task-text" th:text="${task.title}">Task title</span>

            <!-- Delete Button -->
            <button type="button"
                    class="btn btn-delete"
                    th:onclick="'deleteTask(' + ${task.id} + ')'">
                Delete
            </button>
        </li>
    </ul>

    <!-- Empty State -->
    <div class="empty-state" th:if="${tasks == null or tasks.isEmpty()}">
        No tasks yet. Add one above! 🎉
    </div>

    <!-- Task Count -->
    <div class="task-count" th:if="${tasks != null and !tasks.isEmpty()}">
        <span th:text="${tasks.size()}">0</span> task(s) total
    </div>
</div>

<script>
    // PUT /todotasks/{id} - Toggle任务
    function toggleTask(id) {
        fetch('/todotasks/' + id, {
            method: 'PUT'
        })
            .then(response => {
                if (response.ok) {
                    window.location.reload();
                } else {
                    alert('Failed to toggle task');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error toggling task');
            });
    }

    // DELETE /todotasks/{id} - 删除任务
    function deleteTask(id) {
        if (confirm('Are you sure you want to delete this task?')) {
            fetch('/todotasks/' + id, {
                method: 'DELETE'
            })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert('Failed to delete task');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error deleting task');
                });
        }
    }
</script>
</body>
</html>
