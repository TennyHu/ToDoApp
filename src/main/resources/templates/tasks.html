<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #ffd3b6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fffef7;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            color: #2d6a4f;
            margin-bottom: 30px;
            font-size: 32px;
            text-align: center;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid #d8f3dc;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #74c69d;
            box-shadow: 0 0 0 3px rgba(116, 198, 157, 0.1);
        }

        select {
            padding: 14px 18px;
            border: 2px solid #d8f3dc;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            min-width: 140px;
        }

        select:focus {
            outline: none;
            border-color: #74c69d;
            box-shadow: 0 0 0 3px rgba(116, 198, 157, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #52b788 0%, #74c69d 100%);
            color: white;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #40916c 0%, #52b788 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 145, 108, 0.3);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
            border: 2px solid #f1faee;
        }

        .task-item:hover {
            background: #f8fffe;
            transform: translateX(5px);
            border-color: #d8f3dc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .task-item.completed {
            opacity: 0.6;
            background: #f7f7f7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #52b788;
            flex-shrink: 0;
        }

        .priority-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-high {
            background: #ffe5e5;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        .priority-medium {
            background: #fff9e6;
            color: #f57c00;
            border: 1px solid #ffe082;
        }

        .priority-low {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #c8e6c9;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #2d3748;
            line-height: 1.5;
            word-break: break-word;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 10px 18px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ee5a6f 0%, #dc143c 100%);
            box-shadow: 0 4px 12px rgba(238, 90, 111, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #74c69d;
            font-size: 18px;
        }

        .task-count {
            text-align: center;
            color: #52b788;
            font-size: 14px;
            margin-top: 24px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌿 My Tasks</h1>

    <!-- Add Task Form -->
    <form action="/todotasks" method="post" class="input-group">
        <input type="text"
               name="title"
               placeholder="What needs to be done?"
               required>

        <select name="priority" required>
            <option value="LOW">🟢 Low</option>
            <option value="MEDIUM" selected>🟡 Medium</option>
            <option value="HIGH">🔴 High</option>
        </select>

        <button type="submit" class="btn btn-add">Add Task</button>
    </form>

    <!-- Task List -->
    <ul class="task-list" th:if="${tasks != null and !tasks.isEmpty()}">
        <li th:each="task : ${tasks}"
            th:class="${task.completed} ? 'task-item completed' : 'task-item'">

            <!-- Toggle Checkbox -->
            <input type="checkbox"
                   class="checkbox"
                   th:checked="${task.completed}"
                   th:onclick="'toggleTask(' + ${task.id} + ')'">

            <!-- Priority Badge -->
            <span class="priority-badge priority-medium"
                  th:text="${task.priority != null ? task.priority : 'MEDIUM'}"
                  th:class="'priority-badge ' + ${task.priority != null ? ('priority-' + task.priority.toString().toLowerCase()) : 'priority-medium'}">
                </span>

            <!-- Task Title -->
            <span class="task-text" th:text="${task.title}">Task title</span>

            <!-- Delete Button -->
            <button type="button"
                    class="btn btn-delete"
                    th:onclick="'deleteTask(' + ${task.id} + ')'">
                Delete
            </button>
        </li>
    </ul>

    <!-- Empty State -->
    <div class="empty-state" th:if="${tasks == null or tasks.isEmpty()}">
        🌱
        <p>No tasks yet. Start fresh! ✨</p>
    </div>

    <!-- Task Count -->
    <div class="task-count" th:if="${tasks != null and !tasks.isEmpty()}">
        📝 <span th:text="${tasks.size()}">0</span> task(s) total
    </div>
</div>

<script>
    function toggleTask(id) {
        fetch('/todotasks/' + id, {
            method: 'PUT'
        })
            .then(response => {
                if (response.ok) {
                    window.location.reload();
                } else {
                    alert('Failed to toggle task');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error toggling task');
            });
    }

    function deleteTask(id) {
        if (confirm('Are you sure you want to delete this task?')) {
            fetch('/todotasks/' + id, {
                method: 'DELETE'
            })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert('Failed to delete task');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error deleting task');
                });
        }
    }
</script>
</body>
</html>
