<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - REST API Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #ffd3b6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fffef7;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            color: #2d6a4f;
            margin-bottom: 30px;
            font-size: 32px;
            text-align: center;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="date"] {
            padding: 14px 18px;
            border: 2px solid #d8f3dc;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        input[type="date"] {
            min-width: 150px;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: #74c69d;
            box-shadow: 0 0 0 3px rgba(116, 198, 157, 0.1);
        }

        select {
            padding: 14px 18px;
            border: 2px solid #d8f3dc;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            min-width: 140px;
        }

        select:focus {
            outline: none;
            border-color: #74c69d;
            box-shadow: 0 0 0 3px rgba(116, 198, 157, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #52b788 0%, #74c69d 100%);
            color: white;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #40916c 0%, #52b788 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 145, 108, 0.3);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s;
            border: 2px solid #f1faee;
        }

        .task-item:hover {
            background: #f8fffe;
            transform: translateX(5px);
            border-color: #d8f3dc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .task-item.completed {
            opacity: 0.6;
            background: #f7f7f7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #52b788;
            flex-shrink: 0;
        }

        .priority-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-high {
            background: #ffe5e5;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        .priority-medium {
            background: #fff9e6;
            color: #f57c00;
            border: 1px solid #ffe082;
        }

        .priority-low {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #c8e6c9;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            color: #2d3748;
            line-height: 1.5;
            word-break: break-word;
        }

        .deadline-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .deadline-overdue {
            background: #ffe5e5;
            color: #d32f2f;
        }

        .deadline-today {
            background: #fff4e6;
            color: #f57c00;
        }

        .deadline-upcoming {
            background: #e8f5e9;
            color: #388e3c;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 10px 18px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ee5a6f 0%, #dc143c 100%);
            box-shadow: 0 4px 12px rgba(238, 90, 111, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #74c69d;
            font-size: 18px;
        }

        .task-count {
            text-align: center;
            color: #52b788;
            font-size: 14px;
            margin-top: 24px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #74c69d;
        }

        .error-message {
            background: #ffe5e5;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌿 My Tasks</h1>

    <!-- Error Message -->
    <div id="error-message" class="error-message"></div>

    <!-- Add Task Form -->
    <form id="task-form" class="input-group">
        <input type="text"
               id="task-title"
               placeholder="What needs to be done?"
               required>

        <select id="task-priority" required>
            <option value="LOW">🟢 Low</option>
            <option value="MEDIUM" selected>🟡 Medium</option>
            <option value="HIGH">🔴 High</option>
        </select>

        <input type="date"
               id="task-deadline"
               placeholder="Deadline"
               required>

        <button type="submit" class="btn btn-add">Add Task</button>
    </form>

    <!-- Loading State -->
    <div id="loading" class="loading" style="display: none;">
        Loading tasks...
    </div>

    <!-- Task List -->
    <ul id="task-list" class="task-list">
        <!-- Tasks will be inserted here by JavaScript -->
    </ul>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state" style="display: none;">
        🌱
        <p>No tasks yet. Start fresh! ✨</p>
    </div>

    <!-- Task Count -->
    <div id="task-count" class="task-count" style="display: none;">
        📝 <span id="count">0</span> task(s) total
    </div>
</div>

<script>
    // API Base URL
    const API_BASE_URL = 'http://localhost:8080/api/tasks';

    // DOM Elements
    const taskForm = document.getElementById('task-form');
    const taskTitleInput = document.getElementById('task-title');
    const taskPrioritySelect = document.getElementById('task-priority');
    const taskDeadlineInput = document.getElementById('task-deadline');
    const taskList = document.getElementById('task-list');
    const emptyState = document.getElementById('empty-state');
    const taskCount = document.getElementById('task-count');
    const countSpan = document.getElementById('count');
    const loading = document.getElementById('loading');
    const errorMessage = document.getElementById('error-message');

    // Load tasks on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadTasks();
    });

    // Add task form submission
    taskForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        await createTask();
    });

    // Show error message
    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 5000);
    }

    // GET /api/tasks - Load all tasks
    async function loadTasks() {
        try {
            loading.style.display = 'block';
            taskList.innerHTML = '';

            const response = await fetch(API_BASE_URL);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            loading.style.display = 'none';

            console.log('Loaded tasks:', result); // Debug

            if (result.code === 1 && result.data) {
                const tasks = result.data;

                if (tasks.length === 0) {
                    emptyState.style.display = 'block';
                    taskCount.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    taskCount.style.display = 'block';
                    countSpan.textContent = tasks.length;

                    tasks.forEach(task => {
                        renderTask(task);
                    });
                }
            }
        } catch (error) {
            console.error('Error loading tasks:', error);
            loading.style.display = 'none';
            showError('Failed to load tasks. Is the server running?');
        }
    }

    // POST /api/tasks - Create new task
    async function createTask() {
        const title = taskTitleInput.value.trim();
        const priority = taskPrioritySelect.value;
        const deadline = taskDeadlineInput.value;

        if (!title || !deadline) {
            showError('Please fill in all fields');
            return;
        }

        try {
            // 使用 URLSearchParams 构建表单数据
            const formData = new URLSearchParams();
            formData.append('title', title);
            formData.append('priority', priority);
            formData.append('deadline', deadline);

            console.log('Creating task:', formData.toString()); // Debug

            const response = await fetch(API_BASE_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            });

            console.log('Response status:', response.status); // Debug

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            console.log('Response data:', result); // Debug

            if (result.code === 1) {
                taskTitleInput.value = '';
                taskPrioritySelect.value = 'MEDIUM';
                taskDeadlineInput.value = '';
                await loadTasks();
            } else {
                showError('Failed to create task: ' + result.msg);
            }
        } catch (error) {
            console.error('Error creating task:', error);
            showError('Failed to create task: ' + error.message);
        }
    }

    // PUT /api/tasks/{id} - Toggle task completion
    async function toggleTask(id) {
        try {
            const response = await fetch(`${API_BASE_URL}/${id}`, {
                method: 'PUT'
            });

            const result = await response.json();

            if (result.code === 1) {
                await loadTasks();
            } else {
                showError('Failed to toggle task: ' + result.msg);
            }
        } catch (error) {
            console.error('Error toggling task:', error);
            showError('Failed to toggle task');
        }
    }

    // DELETE /api/tasks/{id} - Delete task
    async function deleteTask(id) {
        if (!confirm('Are you sure you want to delete this task?')) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/${id}`, {
                method: 'DELETE'
            });

            const result = await response.json();

            if (result.code === 1) {
                await loadTasks();
            } else {
                showError('Failed to delete task: ' + result.msg);
            }
        } catch (error) {
            console.error('Error deleting task:', error);
            showError('Failed to delete task');
        }
    }

    // Calculate days remaining
    function getDaysRemaining(deadline) {
        if (!deadline) return null;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const due = new Date(deadline);
        due.setHours(0, 0, 0, 0);

        const diffTime = due - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        return diffDays;
    }

    // Format deadline display
    function formatDeadline(deadline) {
        const daysLeft = getDaysRemaining(deadline);

        if (daysLeft === null) return null;

        if (daysLeft < 0) {
            return {
                text: `过期 ${-daysLeft} 天`,
                class: 'deadline-overdue'
            };
        } else if (daysLeft === 0) {
            return {
                text: '今天截止',
                class: 'deadline-today'
            };
        } else if (daysLeft === 1) {
            return {
                text: '明天截止',
                class: 'deadline-upcoming'
            };
        } else {
            return {
                text: `还剩 ${daysLeft} 天`,
                class: 'deadline-upcoming'
            };
        }
    }

    // Render a single task
    function renderTask(task) {
        const li = document.createElement('li');
        li.className = task.completed ? 'task-item completed' : 'task-item';

        // Checkbox
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'checkbox';
        checkbox.checked = task.completed;
        checkbox.addEventListener('click', () => toggleTask(task.id));

        // Priority Badge
        const priorityBadge = document.createElement('span');
        priorityBadge.className = `priority-badge priority-${task.priority.toLowerCase()}`;
        priorityBadge.textContent = task.priority;

        // Task Text
        const taskText = document.createElement('span');
        taskText.className = 'task-text';
        taskText.textContent = task.title;

        // Deadline Badge
        if (task.deadline) {
            const deadlineInfo = formatDeadline(task.deadline);
            if (deadlineInfo) {
                const deadlineBadge = document.createElement('span');
                deadlineBadge.className = `deadline-badge ${deadlineInfo.class}`;
                deadlineBadge.textContent = deadlineInfo.text;
                li.appendChild(checkbox);
                li.appendChild(priorityBadge);
                li.appendChild(taskText);
                li.appendChild(deadlineBadge);
            }
        } else {
            li.appendChild(checkbox);
            li.appendChild(priorityBadge);
            li.appendChild(taskText);
        }

        // Delete Button
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-delete';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTask(task.id));

        li.appendChild(deleteBtn);
        taskList.appendChild(li);
    }
</script>
</body>
</html>
